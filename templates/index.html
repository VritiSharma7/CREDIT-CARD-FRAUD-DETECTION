<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fraud Detection Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Fraud Detection Dashboard</h2>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>

        <form method="POST" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label for="amount" class="form-label">Transaction Amount:</label>
                <input type="number" name="amount" class="form-control" step="0.01" required>
            </div>
            <div class="mb-3">
                <label for="time" class="form-label">Transaction Time (in seconds):</label>
                <input type="number" name="time" class="form-control" step="1" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Check for Fraud</button>
        </form>

        {% if prediction %}
        <div class="alert alert-info text-center mt-4">
            <strong>Prediction:</strong> {{ prediction|upper }}
        </div>
        {% endif %}

        <div class="text-center mt-5">
            <h5>Model Performance:</h5>
            <img src="{{ url_for('static', filename='model_comparison.png') }}" alt="Model Comparison"
                class="img-fluid">
        </div>
    </div>
</body>

</html>
